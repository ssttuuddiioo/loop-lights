<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shader Preview — Gradient Ramp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  canvas { display: block; width: 100vw; height: 70vh; }
  .controls {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px 32px;
  }
  .control { display: flex; flex-direction: column; gap: 4px; }
  .control label { display: flex; justify-content: space-between; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .control label span { color: #e8ff47; font-size: 13px; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
    background: #222; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #e8ff47; cursor: pointer;
  }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; padding: 16px 24px 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<h2>ELM Parameter Preview</h2>
<div class="controls">
  <div class="control">
    <label>Force — Color 1 Hue <span id="v-force">1</span></label>
    <input type="range" id="force" min="1" max="10" step="0.1" value="1">
  </div>
  <div class="control">
    <label>Force 2 — Color 2 Hue <span id="v-force2">5</span></label>
    <input type="range" id="force2" min="1" max="10" step="0.1" value="5">
  </div>
  <div class="control">
    <label>Nb Items — Tiles <span id="v-nbitems">1</span></label>
    <input type="range" id="nbitems" min="1" max="20" step="1" value="1">
  </div>
  <div class="control">
    <label>Speed <span id="v-speed">1</span></label>
    <input type="range" id="speed" min="0" max="2" step="0.05" value="1">
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

const fragSrc = `
precision highp float;
uniform float iTime;
uniform vec2 iResolution;
uniform float iForce;
uniform float iForce2;
uniform float iNbItems;

vec3 hsv2rgb(float h, float s, float v) {
    vec3 c = vec3(h, s, v);
    vec3 rgb = clamp(abs(mod(c.x * 6.0 + vec3(0.0, 4.0, 2.0), 6.0) - 3.0) - 1.0, 0.0, 1.0);
    return c.z * mix(vec3(1.0), rgb, c.y);
}

void main() {
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    float hue1 = (iForce - 1.0) / 9.0;
    float hue2 = (iForce2 - 1.0) / 9.0;
    vec3 color1 = hsv2rgb(hue1, 1.0, 1.0);
    vec3 color2 = hsv2rgb(hue2, 1.0, 1.0);
    float tiles = max(iNbItems, 1.0);
    float t = fract(uv.y * tiles - iTime * 0.2);
    vec3 col = mix(color1, color2, t);
    gl_FragColor = vec4(col, 1.0);
}
`;

const vertSrc = `attribute vec2 pos; void main() { gl_Position = vec4(pos, 0.0, 1.0); }`;

function compile(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl, gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, compile(gl, gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'iTime');
const uRes = gl.getUniformLocation(prog, 'iResolution');
const uForce = gl.getUniformLocation(prog, 'iForce');
const uForce2 = gl.getUniformLocation(prog, 'iForce2');
const uNb Items = gl.getUniformLocation(prog, 'iNbItems');

const elForce = document.getElementById('force');
const elForce2 = document.getElementById('force2');
const elNb Items = document.getElementById('nbitems');
const elSpeed = document.getElementById('speed');

function resize() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const start = performance.now();
function frame() {
  const speedVal = parseFloat(elSpeed.value);
  const t = (performance.now() - start) / 1000 * speedVal;

  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uForce, parseFloat(elForce.value));
  gl.uniform1f(uForce2, parseFloat(elForce2.value));
  gl.uniform1f(uNb Items, parseFloat(elNb Items.value));

  document.getElementById('v-force').textContent = parseFloat(elForce.value).toFixed(1);
  document.getElementById('v-force2').textContent = parseFloat(elForce2.value).toFixed(1);
  document.getElementById('v-nbitems').textContent = elNb Items.value;
  document.getElementById('v-speed').textContent = parseFloat(elSpeed.value).toFixed(2);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
